name: DevSecOps Lab

on: [push]

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1. Secret Scanning
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true # Para que no frene el resto del lab

      # 2. IA Audit (Groq)
      - name: AI Audit
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          # Intentamos obtener el diff de forma segura
          export CODE_DIFF=$(git diff HEAD^ HEAD || git diff HEAD)
          python .github/scripts/ai_audit.py

      # 3. SCA (Snyk)
      - name: Snyk Scan
        uses: snyk/actions/php@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      # 4. IaC (Checkov)
      - name: Checkov Scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: dockerfile
          soft_fail: true

      # 5. Build & Trivy
      - name: Build Image
        run: docker build -t weather-api:latest .

      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'weather-api:latest'
          format: 'table'
          severity: 'CRITICAL,HIGH'

      # 6. Levantar y DAST (StackHawk)
      - name: Run App
        run: docker run -d -p 8080:80 weather-api:latest

      - name: StackHawk DAST
        uses: stackhawk/hawkscan-action@v2
        continue-on-error: true
        with:
          apiKey: ${{ secrets.HAWK_TOKEN }}
        env:
          HAWK_APP_ID: ${{ secrets.HAWK_APP_ID }}