name: DevSecOps Enterprise — Fixed v2
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'

# ─────────────────────────────────────────────────────────────────────────────
# NOTA: SHA PINNING Y SUPPLY CHAIN SECURITY VERIFICADOS (2026-05-10)
# ─────────────────────────────────────────────────────────────────────────────

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SEVERITY_THRESHOLD: CRITICAL,HIGH
  MAX_DIFF_SIZE: "204800"

permissions:
  contents: read
  security-events: write
  issues: write
  pull-requests: write

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # JOB 0: Validación rápida de secrets
  # ──────────────────────────────────────────────────────────────────────────
  preflight:
    name: Preflight — Validate required secrets
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Validate required secrets
        run: |
          MISSING=""
          [ -z "${{ secrets.GITLEAKS_LICENSE }}" ] && MISSING="$MISSING GITLEAKS_LICENSE"
          [ -z "${{ secrets.SNYK_TOKEN }}"       ] && MISSING="$MISSING SNYK_TOKEN"
          if [ -n "$MISSING" ]; then
            echo "::error::Secrets faltantes:$MISSING"
            exit 1
          fi
          echo "✅ Todos los secrets requeridos presentes"

  # ──────────────────────────────────────────────────────────────────────────
  # JOB PRINCIPAL
  # ──────────────────────────────────────────────────────────────────────────
  build-and-secure:
    name: Security Pipeline
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      # ──────────────────────────────────────────────────────────────────────
      # FASE 1: SECRET SCANNING
      # ──────────────────────────────────────────────────────────────────────
      - name: 🔐 Gitleaks Secret Scan
        id: gitleaks
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      - name: 🔍 TruffleHog Secret Scan
        id: trufflehog
        uses: trufflesecurity/trufflehog@47e7b7cd74f578e1e3145d48f669f22fd1330ca6 # v3.94.3
        with:
          path: ./
          extra_args: --results=verified,unknown

      # ──────────────────────────────────────────────────────────────────────
      # FASE 2: DEPENDENCY SECURITY (SCA)
      # ──────────────────────────────────────────────────────────────────────
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, json

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist

      - name: 📦 Snyk Dependency Scan (SCA)
        id: snyk
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          SNYK_VERSION="v1.1296.2"
          curl -sSL "https://downloads.snyk.io/cli/${SNYK_VERSION}/snyk-linux" -o snyk-linux
          curl -sSL "https://downloads.snyk.io/cli/${SNYK_VERSION}/snyk-linux.sha256" -o snyk-linux.sha256
          sha256sum -c snyk-linux.sha256
          chmod +x snyk-linux
          sudo mv snyk-linux /usr/local/bin/snyk
          snyk test --severity-threshold=high --json > snyk-results.json || echo "SNYK_EXIT=$?" >> $GITHUB_ENV

      - name: Upload Snyk Results
        if: always() && hashFiles('snyk-results.json') != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: snyk-results-${{ github.sha }}
          path: snyk-results.json
          retention-days: 7

      # ──────────────────────────────────────────────────────────────────────
      # FASE 3: SAST (Static Analysis)
      # ──────────────────────────────────────────────────────────────────────
      - name: 🧬 PHPStan Static Analysis
        id: phpstan
        run: |
          composer require --dev phpstan/phpstan phpunit/phpunit --no-interaction
          vendor/bin/phpstan analyse src --level=8 --error-format=github

      - name: 🎯 Semgrep SAST Scan
        id: semgrep
        run: |
          docker run --rm -v "$(pwd)":/src semgrep/semgrep semgrep scan \
            --config auto --config p/owasp-top-ten --config p/php \
            --sarif --output=semgrep.sarif

      - name: ✨ Validate SARIF
        if: always()
        run: |
          if [ ! -s semgrep.sarif ]; then
            printf '{"$schema":"https://json.schemastore.org/sarif-2.1.0.json","version":"2.1.0","runs":[{"tool":{"driver":{"name":"Semgrep"}},"results":[]}]}\n' > semgrep.sarif
          fi

      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@bc02a25f6449997c5e9d5a368879b28f56ae19a1
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      # ──────────────────────────────────────────────────────────────────────
      # FASE 4: IaC SECURITY
      # ──────────────────────────────────────────────────────────────────────
      - name: 🏗️ Checkov Dockerfile & Actions Scan
        id: checkov
        uses: bridgecrewio/checkov-action@02a4c5d6a02367e5ea493c34c26b094302fd3f61 # v12.3075.0
        with:
          directory: .
          skip_path: vendor
          framework: dockerfile,github_actions
          output_format: cli,sarif
          output_file_path: console,checkov.sarif
          soft_fail: false

      - name: Upload Checkov SARIF
        uses: github/codeql-action/upload-sarif@bc02a25f6449997c5e9d5a368879b28f56ae19a1
        if: always()
        with:
          sarif_file: checkov.sarif
          category: checkov

      # ──────────────────────────────────────────────────────────────────────
      # FASE 5: CONTAINER BUILD & SCAN
      # ──────────────────────────────────────────────────────────────────────
      - name: 🐳 Build Protected Image
        id: build
        run: docker build --no-cache -t weather-api:${{ github.sha }} .

      - name: 🛡️ Trivy Container Scan
        id: trivy
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0 (POST-INCIDENTE)
        with:
          image-ref: 'weather-api:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: false

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@bc02a25f6449997c5e9d5a368879b28f56ae19a1
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
          category: trivy

      # ──────────────────────────────────────────────────────────────────────
      # FASE 6: DAST — StackHawk (FIXED)
      # ──────────────────────────────────────────────────────────────────────
      - name: 🌐 Start App for DAST
        id: start_app
        if: github.event_name == 'push'
        run: |
          # Usamos --network host para que el puerto 8080 sea realmente localhost
          docker run -d --name weather-api-dast --network host weather-api:${{ github.sha }}
          
          # Esperamos a que la app responda (cambiamos el check a uno más simple si es necesario)
          timeout 60 bash -c 'until curl -s http://localhost:8080 > /dev/null; do sleep 2; echo "Esperando app..."; done'
          echo "✅ App lista en http://localhost:8080"

      - name: 🦅 StackHawk DAST Scan
        id: stackhawk
        env:
          HAWK_APP_ID: ${{ secrets.HAWK_APP_ID }} 
          APP_ENV: ci
          APP_HOST: http://localhost:8080
          HAWK_TOKEN: ${{ secrets.HAWK_TOKEN }}
        if: >-
          github.event_name == 'push' &&
          steps.start_app.outcome == 'success' &&
          env.HAWK_TOKEN != '' &&
          env.HAWK_APP_ID != ''
        uses: stackhawk/hawkscan-action@29a62fe1e926ea50ac87a1b64efc59b82ffd5b7d
        with:
          apiKey: ${{ env.HAWK_TOKEN }}
          configurationFiles: .stackhawk.yml
      - name: 🛑 Stop DAST App
        if: always() && github.event_name == 'push'
        run: docker rm -f weather-api-dast 2>/dev/null || true

      # ──────────────────────────────────────────────────────────────────────
      # FASE 7: SBOM
      # ──────────────────────────────────────────────────────────────────────
      - name: 📋 Generate SBOM
        id: sbom
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin
          syft weather-api:${{ github.sha }} -o spdx-json=sbom.spdx.json -o cyclonedx-json=sbom.cyclonedx.json

      - name: Upload SBOM
        if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: sbom-${{ github.sha }}
          path: sbom.*.json
          retention-days: 7

      # ──────────────────────────────────────────────────────────────────────
      # FASE 8: AI Security Audit (Groq)
      # ──────────────────────────────────────────────────────────────────────
      - name: 🤖 AI Security Audit (Groq)
        id: ai_audit
        if: github.event_name == 'pull_request'
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          pip install requests --quiet
          RAW_DIFF=$(git diff HEAD~1 HEAD -- '*.php' '*.yml' '*.json' | head -c "$MAX_DIFF_SIZE") || RAW_DIFF=""
          if [ -z "$RAW_DIFF" ] || [ -z "$GROQ_API_KEY" ]; then
            echo "ℹ️ Omitiendo auditoría IA (Diff vacío o API Key ausente)"
            exit 0
          fi
          export CODE_DIFF="$RAW_DIFF"
          python3 .github/scripts/ai_audit.py

      - name: Upload AI Audit Report
        if: always() && hashFiles('ai-audit-report.md') != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ai-audit-${{ github.sha }}
          path: ai-audit-report.md
          retention-days: 7

      # ──────────────────────────────────────────────────────────────────────
      # FASE 9: SECURITY SCORE & SUMMARY
      # ──────────────────────────────────────────────────────────────────────
      - name: 📊 Calculate Security Score
        id: security_score
        if: always()
        run: |
          SCORE=100
          [ "${{ steps.gitleaks.outcome }}"   != "success" ] && SCORE=$((SCORE - 25))
          [ "${{ steps.trufflehog.outcome }}" != "success" ] && SCORE=$((SCORE - 25))
          [ "${{ steps.snyk.outcome }}"       == "failure" ] && SCORE=$((SCORE - 15))
          [ "${{ steps.phpstan.outcome }}"    != "success" ] && SCORE=$((SCORE - 15))
          [ "${{ steps.semgrep.outcome }}"    != "success" ] && SCORE=$((SCORE - 10))
          [ "${{ steps.trivy.outcome }}"      != "success" ] && SCORE=$((SCORE - 20))
          [ "${{ steps.checkov.outcome }}"    != "success" ] && SCORE=$((SCORE - 10))
          [ "$SCORE" -lt 0 ] && SCORE=0
          echo "score=$SCORE" >> "$GITHUB_OUTPUT"

      - name: 📋 Generate Pipeline Summary
        if: always()
        env:
          SCORE: ${{ steps.security_score.outputs.score }}
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << SUMMARY
          ## 🛡️ DevSecOps Security Scorecard
          **Pipeline Run**: #${{ github.run_number }}
          **Commit**: \`${{ github.sha }}\`
          **Security Score**: **${SCORE}/100**
          ---
          ### 🔒 Security Status
          | Tool | Status |
          | :--- | :---: |
          | 🔐 Gitleaks   | ${{ steps.gitleaks.outcome == 'success' && '✅' || '❌' }} |
          | 🔍 TruffleHog | ${{ steps.trufflehog.outcome == 'success' && '✅' || '❌' }} |
          | 📦 Snyk (SCA) | ${{ steps.snyk.outcome == 'success' && '✅' || '❌' }} |
          | 🧬 PHPStan    | ${{ steps.phpstan.outcome == 'success' && '✅' || '❌' }} |
          | 🎯 Semgrep    | ${{ steps.semgrep.outcome == 'success' && '✅' || '⚠️' }} |
          | 🏗️ Checkov   | ${{ steps.checkov.outcome == 'success' && '✅' || '❌' }} |
          | 🛡️ Trivy     | ${{ steps.trivy.outcome == 'success' && '✅' || '❌' }} |
          | 🦅 StackHawk | ${{ steps.stackhawk.outcome == 'success' && '✅' || steps.stackhawk.outcome == 'skipped' && '⏭️' || '⚠️' }} |
          SUMMARY

      # ──────────────────────────────────────────────────────────────────────
      # FASE 10: AUDIT LOGGING
      # ──────────────────────────────────────────────────────────────────────
      - name: 📝 Generate Audit Log
        if: always()
        run: |
          jq -n \
            --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg run "${{ github.run_number }}" \
            --argjson score "${{ steps.security_score.outputs.score || 0 }}" \
            --arg branch "${{ github.ref_name }}" \
            --arg actor "${{ github.actor }}" \
            --arg sha "${{ github.sha }}" \
            --arg status "${{ job.status }}" \
            '{timestamp: $ts, pipeline_run: $run, security_score: $score, branch: $branch, triggered_by: $actor, commit_sha: $sha, status: $status}' > audit-log.json

      - name: 📤 Upload Audit Log
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: audit-log-${{ github.sha }}
          path: audit-log.json
          retention-days: 7