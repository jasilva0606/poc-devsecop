name: DevSecOps Enterprise — Fixed v2
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'

# ─────────────────────────────────────────────────────────────────────────────
# NOTA IMPORTANTE — SHA PINNING Y SUPPLY CHAIN SECURITY
#
# Todos los `uses:` están fijados a SHAs de commit VERIFICADOS obtenidos
# directamente de la página de releases de cada repositorio.
#
# ⚠️  INCIDENTE DE SEGURIDAD CONOCIDO (Marzo 2026):
#     aquasecurity/trivy-action fue COMPROMETIDO. 75 de 76 tags fueron
#     reemplazados por código malicioso (infostealer de secrets de CI/CD).
#     Ver: https://github.com/aquasecurity/trivy/discussions/10425
#
#     USO OBLIGATORIO: trivy-action@v0.36.0 — primer release post-incidente.
#     SHA verificado: a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8
#     NUNCA usar @master, @main, ni tags anteriores a v0.35.0.
#
# SHA map — VERIFICADOS con `gh api` el 2026-05-10 (actualizar con update-action-pins.sh):
#   actions/checkout@v4.2.2                → 11bd71901bbe5b1630ceea73d27597364c9af683
#   actions/upload-artifact@v4.6.2         → ea165f8d65b6e75b540449e92b4886f43607fa02
#   github/codeql-action@codeql-bundle-v2.21.4 → bc02a25f6449997c5e9d5a368879b28f56ae19a1
#   shivammathur/setup-php@v2              → (rolling tag — mantenido por el autor, bajo riesgo)
#   gitleaks/gitleaks-action@v2.3.9        → ff98106e4c7b2bc287b24eaf42907196329070c7
#   trufflesecurity/trufflehog@v3.94.3     → 47e7b7cd74f578e1e3145d48f669f22fd1330ca6
#   aquasecurity/trivy-action@v0.36.0      → a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8
#   bridgecrewio/checkov-action@v12.3075.0 → 02a4c5d6a02367e5ea493c34c26b094302fd3f61
# ─────────────────────────────────────────────────────────────────────────────

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SEVERITY_THRESHOLD: CRITICAL,HIGH
  MAX_DIFF_SIZE: "204800"

permissions:
  contents: read
  security-events: write
  issues: write
  pull-requests: write

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # JOB 0: Validación rápida de secrets antes de gastar minutos de runner
  # ──────────────────────────────────────────────────────────────────────────
  preflight:
    name: Preflight — Validate required secrets
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Validate required secrets
        run: |
          MISSING=""
          [ -z "${{ secrets.GITLEAKS_LICENSE }}" ] && MISSING="$MISSING GITLEAKS_LICENSE"
          [ -z "${{ secrets.SNYK_TOKEN }}"       ] && MISSING="$MISSING SNYK_TOKEN"
          if [ -n "$MISSING" ]; then
            echo "::error::Secrets faltantes:$MISSING"
            exit 1
          fi
          echo "✅ Todos los secrets requeridos presentes"

  # ──────────────────────────────────────────────────────────────────────────
  # JOB PRINCIPAL
  # ──────────────────────────────────────────────────────────────────────────
  build-and-secure:
    name: Security Pipeline
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout Code
        # actions/checkout v4.2.2 — SHA verificado en https://github.com/actions/checkout/releases/tag/v4.2.2
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0

      # ──────────────────────────────────────────────────────────────────────
      # FASE 1: SECRET SCANNING
      # ──────────────────────────────────────────────────────────────────────
      - name: 🔐 Gitleaks Secret Scan
        id: gitleaks
        # gitleaks-action v2.3.9 — SHA verificado en https://github.com/gitleaks/gitleaks-action/releases/tag/v2.3.9
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        # No continue-on-error: secretos filtrados son SIEMPRE bloqueantes

      - name: 🔍 TruffleHog Secret Scan
        id: trufflehog
        # trufflesecurity/trufflehog v3.94.3 — SHA verificado con gh api
        uses: trufflesecurity/trufflehog@47e7b7cd74f578e1e3145d48f669f22fd1330ca6
        with:
          path: ./
          extra_args: --results=verified,unknown
        # Sin continue-on-error: TruffleHog también es gate duro

      # ──────────────────────────────────────────────────────────────────────
      # FASE 2: DEPENDENCY SECURITY (SCA)
      # ──────────────────────────────────────────────────────────────────────
      - name: Setup PHP
        # shivammathur/setup-php@v2 — tag rolling mantenido activamente por el autor.
        # El autor desaconseja explícitamente el pinning por SHA para esta action
        # ya que @v2 es intencionalmente mutable para recibir security patches automáticos.
        # Ver: https://github.com/shivammathur/setup-php#usage
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, json

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist

      - name: 📦 Snyk Dependency Scan (SCA)
        id: snyk
        # NOTA: snyk/actions no publica tags con SHA pinnable (usa @master internamente).
        # Se usa la CLI directa instalada con checksum verificado — más seguro y auditable.
        # Ver: https://docs.snyk.io/developer-tools/snyk-ci-cd-integrations/snyk-images-guides-to-migration/github-actions-migration
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          # Descargar CLI conservando el nombre original para que sha256sum lo encuentre
          SNYK_VERSION="v1.1296.2"
          curl -sSL "https://downloads.snyk.io/cli/${SNYK_VERSION}/snyk-linux"        -o snyk-linux
          curl -sSL "https://downloads.snyk.io/cli/${SNYK_VERSION}/snyk-linux.sha256" -o snyk-linux.sha256

          # Verificar integridad antes de ejecutar nada
          sha256sum -c snyk-linux.sha256

          # Instalar en PATH
          chmod +x snyk-linux
          sudo mv snyk-linux /usr/local/bin/snyk

          snyk test \
            --severity-threshold=high \
            --json > snyk-results.json || SNYK_EXIT=$?

          # Exit 0 = sin vulnerabilidades, 1 = vulnerabilidades encontradas (gate duro)
          # Exit 2+ = error de configuración (no debe silenciarse)
          if [ "${SNYK_EXIT:-0}" -eq 2 ] || [ "${SNYK_EXIT:-0}" -ge 3 ]; then
            echo "::error::Snyk falló por error de configuración (exit ${SNYK_EXIT})"
            exit "${SNYK_EXIT}"
          fi
          exit "${SNYK_EXIT:-0}"

      - name: Upload Snyk Results
        if: always() && hashFiles('snyk-results.json') != ''
        # actions/upload-artifact v4.6.2 — SHA verificado con gh api
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: snyk-results-${{ github.sha }}
          path: snyk-results.json
          retention-days: 7

      # ──────────────────────────────────────────────────────────────────────
      # FASE 3: SAST (Static Analysis)
      # ──────────────────────────────────────────────────────────────────────
      - name: 🧬 PHPStan Static Analysis
        id: phpstan
        run: |
          composer require --dev phpstan/phpstan phpunit/phpunit --no-interaction
          # Nivel 8: detecta errores de tipo en parámetros, retornos y dead code
          # (nivel 5 original era insuficiente para producción)
          vendor/bin/phpstan analyse src --level=8 --error-format=github

      - name: 🎯 Semgrep SAST Scan
        id: semgrep
        run: |
          docker run --rm -v "$(pwd)":/src semgrep/semgrep semgrep scan \
            --config auto \
            --config p/owasp-top-ten \
            --config p/php \
            --sarif --output=semgrep.sarif
          # Gate duro: '|| true' removido. Si Semgrep falla, falla el job.

      - name: ✨ Validate SARIF
        if: always()
        run: |
          if [ ! -s semgrep.sarif ]; then
            echo "⚠️ Generando SARIF vacío de emergencia..."
            printf '{"$schema":"https://json.schemastore.org/sarif-2.1.0.json","version":"2.1.0","runs":[{"tool":{"driver":{"name":"Semgrep"}},"results":[]}]}\n' > semgrep.sarif
          fi
          # chmod removido: el archivo ya es propiedad del runner y tiene permisos correctos

      - name: Upload Semgrep SARIF
        # github/codeql-action codeql-bundle-v2.21.4 — SHA verificado con gh api
        uses: github/codeql-action/upload-sarif@bc02a25f6449997c5e9d5a368879b28f56ae19a1
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      # ──────────────────────────────────────────────────────────────────────
      # FASE 4: IaC SECURITY
      # ──────────────────────────────────────────────────────────────────────
      - name: 🏗️ Checkov Dockerfile & Actions Scan
        id: checkov
        # bridgecrewio/checkov-action v12.3075.0 — SHA verificado con gh api
        uses: bridgecrewio/checkov-action@02a4c5d6a02367e5ea493c34c26b094302fd3f61
        with:
          directory: .
          skip_path: vendor
          framework: dockerfile,github_actions
          output_format: cli,sarif
          output_file_path: console,checkov.sarif
          soft_fail: false  # Gate duro: IaC failures bloquean el build

      - name: Upload Checkov SARIF
        uses: github/codeql-action/upload-sarif@bc02a25f6449997c5e9d5a368879b28f56ae19a1
        if: always()
        with:
          sarif_file: checkov.sarif
          category: checkov

      # ──────────────────────────────────────────────────────────────────────
      # FASE 5: CONTAINER BUILD & SCAN
      # ──────────────────────────────────────────────────────────────────────
      - name: 🐳 Build Protected Image
        id: build
        run: |
          # --no-cache garantiza builds reproducibles en CI
          docker build --no-cache -t weather-api:${{ github.sha }} .

      - name: 🛡️ Trivy Container Scan
        id: trivy
        # aquasecurity/trivy-action v0.36.0 — SHA verificado con gh api
        # ⚠️  Post-incidente supply chain Marzo 2026 (ver comentario en cabecera del archivo)
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8
        with:
          image-ref: 'weather-api:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'       # Gate duro: bloquea si encuentra CVEs críticos
          ignore-unfixed: false

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@bc02a25f6449997c5e9d5a368879b28f56ae19a1
        if: always()  # Subir SARIF aunque Trivy haya fallado el job
        with:
          sarif_file: 'trivy-results.sarif'
          category: trivy

      # ──────────────────────────────────────────────────────────────────────
      # FASE 6: DAST — StackHawk (FIX: antes existía el .yml pero nunca se ejecutaba)
      # ──────────────────────────────────────────────────────────────────────
      - name: 🌐 Start App for DAST
        id: start_app
        if: github.event_name == 'push'
        run: |
          docker run -d \
            --name weather-api-dast \
            -p 8080:9000 \
            weather-api:${{ github.sha }}
          timeout 30 bash -c 'until docker exec weather-api-dast \
            sh -c "SCRIPT_NAME=/ping SCRIPT_FILENAME=/ping REQUEST_METHOD=GET \
            cgi-fcgi -bind -connect 127.0.0.1:9000" 2>/dev/null; do sleep 2; done'
          echo "✅ App lista para DAST"

      - name: 🦅 StackHawk DAST Scan
        id: stackhawk
        # Se omite si HAWK_TOKEN o HAWK_APP_ID no están configurados como secrets.
        # Para habilitarlo: Settings → Secrets and variables → Actions → New repository secret
        if: >-
          github.event_name == 'push' &&
          steps.start_app.outcome == 'success' &&
          secrets.HAWK_TOKEN != '' &&
          secrets.HAWK_APP_ID  != ''
        # stackhawk/hawkscan-action v2.2.0 — SHA verificado con gh api
        uses: stackhawk/hawkscan-action@29a62fe1e926ea50ac87a1b64efc59b82ffd5b7d
        with:
          apiKey: ${{ secrets.HAWK_TOKEN }}
          # FIX: el archivo se llama .stackhawk.yml (con punto), no stackhawk.yml
          configurationFiles: .stackhawk.yml
        env:
          # FIX: StackHawk lee estas env vars directamente desde el proceso,
          # no las interpola desde el YAML — los valores van aquí, no en .stackhawk.yml
          APP_ID: ${{ secrets.HAWK_APP_ID }}
          APP_ENV: ci
          APP_HOST: http://localhost:8080

      - name: 🛑 Stop DAST App
        if: always() && github.event_name == 'push'
        run: docker rm -f weather-api-dast 2>/dev/null || true

      # ──────────────────────────────────────────────────────────────────────
      # FASE 7: SBOM (Software Bill of Materials)
      # ──────────────────────────────────────────────────────────────────────
      - name: 📋 Generate SBOM
        id: sbom
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b /usr/local/bin
          syft weather-api:${{ github.sha }} \
            -o spdx-json=sbom.spdx.json \
            -o cyclonedx-json=sbom.cyclonedx.json
          echo "✅ SBOM generado (SPDX + CycloneDX)"

      - name: Upload SBOM
        if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: sbom-${{ github.sha }}
          path: |
            sbom.spdx.json
            sbom.cyclonedx.json
          retention-days: 7

      # ──────────────────────────────────────────────────────────────────────
      # FASE 8: AI Security Audit (Groq)
      # ──────────────────────────────────────────────────────────────────────
      - name: 🤖 AI Security Audit (Groq)
        id: ai_audit
        if: github.event_name == 'pull_request'
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          pip install requests --quiet

          # FIX: limitar tamaño del diff ANTES de pasarlo como env var (~200KB max)
          RAW_DIFF=$(git diff HEAD~1 HEAD -- '*.php' '*.yml' '*.json' \
            | head -c "$MAX_DIFF_SIZE") || RAW_DIFF=""

          if [ -z "$RAW_DIFF" ]; then
            echo "ℹ️ Sin diff significativo — omitiendo auditoría IA"
            exit 0
          fi

          export CODE_DIFF="$RAW_DIFF"
          python3 .github/scripts/ai_audit.py

      - name: Upload AI Audit Report
        if: always() && hashFiles('ai-audit-report.md') != ''
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ai-audit-${{ github.sha }}
          path: ai-audit-report.md
          retention-days: 7

      # ──────────────────────────────────────────────────────────────────────
      # FASE 9: SECURITY SCORE & SUMMARY
      # ──────────────────────────────────────────────────────────────────────
      - name: 📊 Calculate Security Score
        id: security_score
        if: always()
        run: |
          SCORE=100
          # FIX: TruffleHog ahora pesa igual que Gitleaks en el score
          [ "${{ steps.gitleaks.outcome }}"   != "success" ] && SCORE=$((SCORE - 25))
          [ "${{ steps.trufflehog.outcome }}" != "success" ] && SCORE=$((SCORE - 25))
          [ "${{ steps.snyk.outcome }}"       == "failure" ] && SCORE=$((SCORE - 15))
          [ "${{ steps.phpstan.outcome }}"    != "success" ] && SCORE=$((SCORE - 15))
          [ "${{ steps.semgrep.outcome }}"    != "success" ] && SCORE=$((SCORE - 10))
          [ "${{ steps.trivy.outcome }}"      != "success" ] && SCORE=$((SCORE - 20))
          [ "${{ steps.checkov.outcome }}"    != "success" ] && SCORE=$((SCORE - 10))
          [ "$SCORE" -lt 0 ] && SCORE=0
          echo "score=$SCORE" >> "$GITHUB_OUTPUT"
          echo "📊 Security Score: $SCORE/100"

      - name: 📋 Generate Pipeline Summary
        if: always()
        env:
          RUN_NUM: ${{ github.run_number }}
          SHA: ${{ github.sha }}
          BRANCH: ${{ github.ref_name }}
          USER: ${{ github.actor }}
          SCORE: ${{ steps.security_score.outputs.score }}
        run: |
          # FIX: variables interpoladas FUERA del heredoc para evitar inyección de comandos
          cat >> "$GITHUB_STEP_SUMMARY" << 'SUMMARY'
          ## 🛡️ DevSecOps Security Scorecard
          SUMMARY

          echo "**Pipeline Run**: #${RUN_NUM}" >> "$GITHUB_STEP_SUMMARY"
          echo "**Commit**: \`${SHA}\`"        >> "$GITHUB_STEP_SUMMARY"
          echo "**Branch**: \`${BRANCH}\`"     >> "$GITHUB_STEP_SUMMARY"
          echo "**Triggered by**: @${USER}"    >> "$GITHUB_STEP_SUMMARY"
          echo "**Security Score**: **${SCORE}/100**" >> "$GITHUB_STEP_SUMMARY"

          cat >> "$GITHUB_STEP_SUMMARY" << 'SUMMARY'
          ---
          ### 🔒 Security Status
          | Tool | Status |
          | :--- | :---: |
          SUMMARY

          printf "| 🔐 Gitleaks   | %s |\n"   "${{ steps.gitleaks.outcome == 'success' && '✅' || '❌' }}"    >> "$GITHUB_STEP_SUMMARY"
          printf "| 🔍 TruffleHog | %s |\n"   "${{ steps.trufflehog.outcome == 'success' && '✅' || '❌' }}" >> "$GITHUB_STEP_SUMMARY"
          printf "| 📦 Snyk (SCA) | %s |\n"   "${{ steps.snyk.outcome == 'success' && '✅' || '❌' }}"       >> "$GITHUB_STEP_SUMMARY"
          printf "| 🧬 PHPStan    | %s |\n"   "${{ steps.phpstan.outcome == 'success' && '✅' || '❌' }}"    >> "$GITHUB_STEP_SUMMARY"
          printf "| 🎯 Semgrep    | %s |\n"   "${{ steps.semgrep.outcome == 'success' && '✅' || '⚠️' }}"   >> "$GITHUB_STEP_SUMMARY"
          printf "| 🏗️ Checkov   | %s |\n"   "${{ steps.checkov.outcome == 'success' && '✅' || '❌' }}"    >> "$GITHUB_STEP_SUMMARY"
          printf "| 🛡️ Trivy     | %s |\n"   "${{ steps.trivy.outcome == 'success' && '✅' || '❌' }}"      >> "$GITHUB_STEP_SUMMARY"
          printf "| 🦅 StackHawk | %s |\n"   "${{ steps.stackhawk.outcome == 'success' && '✅' || steps.stackhawk.outcome == 'skipped' && '⏭️' || '⚠️' }}" >> "$GITHUB_STEP_SUMMARY"

      # ──────────────────────────────────────────────────────────────────────
      # FASE 10: AUDIT LOGGING
      # ──────────────────────────────────────────────────────────────────────
      - name: 📝 Generate Audit Log
        if: always()
        env:
          SCORE: ${{ steps.security_score.outputs.score }}
          BRANCH: ${{ github.ref_name }}
          USER: ${{ github.actor }}
          JOB_STATUS: ${{ job.status }}
          RUN_NUMBER: ${{ github.run_number }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          # FIX CRÍTICO: usar jq para construir JSON de forma segura.
          # El heredoc original con $BRANCH/$USER era vulnerable a inyección
          # si el nombre de rama o actor contenía caracteres especiales.
          jq -n \
            --arg ts        "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg run       "$RUN_NUMBER" \
            --argjson score "${SCORE:-0}" \
            --arg branch    "$BRANCH" \
            --arg actor     "$USER" \
            --arg sha       "$COMMIT_SHA" \
            --arg status    "$JOB_STATUS" \
            '{
              timestamp:      $ts,
              pipeline_run:   $run,
              security_score: $score,
              branch:         $branch,
              triggered_by:   $actor,
              commit_sha:     $sha,
              status:         $status
            }' > audit-log.json

          echo "✅ Audit log generado:"
          cat audit-log.json

      - name: 📤 Upload Audit Log
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        if: always()
        with:
          name: audit-log-${{ github.sha }}
          path: audit-log.json
          retention-days: 7