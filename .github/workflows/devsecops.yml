name: DevSecOps 10/10 Enterprise
on: 
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SEVERITY_THRESHOLD: CRITICAL,HIGH

permissions:
  contents: read
  security-events: write
  issues: write
  pull-requests: write

jobs:
  build-and-secure:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ========================================
      # FASE 1: SECRET SCANNING
      # ========================================
      - name: 🔐 Gitleaks Secret Scan
        id: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      - name: 🔍 TruffleHog Secret Scan
        id: trufflehog
        uses: trufflesecurity/trufflehog@main
        continue-on-error: true
        with:
          path: ./
          extra_args: --results=verified,unknown

      # ========================================
      # FASE 2: DEPENDENCY SECURITY (SCA)
      # ========================================
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, json

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist

      - name: 📦 Snyk Dependency Scan (SCA)
        id: snyk
        uses: snyk/actions/php@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --json-file-output=snyk-results.json

      # ========================================
      # FASE 3: SAST (Static Analysis)
      # ========================================
      - name: 🎯 Semgrep SAST Scan
        id: semgrep
        run: |
          # Ejecutamos semgrep usando docker directamente para evitar problemas de Entrypoint de la acción
          docker run --rm -v $(pwd):/src returntocorp/semgrep semgrep scan \
            --config auto \
            --config p/owasp-top-ten \
            --config p/php \
            --sarif --output=semgrep.sarif || true

      - name: ✨ Fix & Validate SARIF
        if: always()
        run: |
          # Verificamos si el archivo existe y tiene contenido
          if [ ! -s semgrep.sarif ]; then
            echo "⚠️ Generando SARIF de emergencia por falta de resultados..."
            echo '{"$schema":"https://json.schemastore.org/sarif-2.1.0.json","version":"2.1.0","runs":[{"tool":{"driver":{"name":"Semgrep"}},"results":[]}]}' > semgrep.sarif
          fi
          sudo chmod 644 semgrep.sarif

      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: semgrep.sarif

      # ========================================
      # FASE 4: IaC SECURITY
      # ========================================
      - name: 🏗️ Checkov Dockerfile Scan
        id: checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          skip_path: vendor
          framework: dockerfile,github_actions
          output_format: cli,sarif
          output_file_path: console,checkov.sarif

      - name: Upload Checkov SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: checkov.sarif

      # ========================================
      # FASE 5: CONTAINER BUILD & SCAN
      # ========================================
      - name: 🐳 Build Protected Image
        id: build
        run: |
          docker build -t weather-api:${{ github.sha }} .

      - name: 🛡️ Trivy Container Scan
        id: trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'weather-api:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0' # Permitimos que continúe para subir el reporte SARIF

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      # ========================================
      # FASE 10: SECURITY METRICS & REPORTING
      # ========================================
      - name: 📊 Calculate Security Score
        id: security_score
        if: always()
        run: |
          SCORE=100
          if [ "${{ steps.gitleaks.outcome }}" != "success" ]; then SCORE=$((SCORE - 25)); fi
          if [ "${{ steps.snyk.outcome }}" == "failure" ]; then SCORE=$((SCORE - 15)); fi
          if [ "${{ steps.phpstan.outcome }}" != "success" ]; then SCORE=$((SCORE - 15)); fi
          if [ "${{ steps.trivy.outcome }}" != "success" ]; then SCORE=$((SCORE - 20)); fi
          echo "score=$SCORE" >> $GITHUB_OUTPUT

      - name: 📋 Generate Pipeline Summary
        if: always()
        env:
          RUN_NUM: ${{ github.run_number }}
          SHA: ${{ github.sha }}
          BRANCH: ${{ github.ref_name }}
          USER: ${{ github.actor }}
          SCORE: ${{ steps.security_score.outputs.score }}
        run: |
          cat << EOF >> $GITHUB_STEP_SUMMARY
          ## 🛡️ DevSecOps Security Scorecard
          
          **Pipeline Run**: #$RUN_NUM
          **Commit**: \`$SHA\`
          **Branch**: \`$BRANCH\`
          **Triggered by**: @$USER
          **Security Score**: **$SCORE/100**
          
          ---
          ### 🔒 Security Status
          | Tool | Status |
          | :--- | :---: |
          | 🔐 Gitleaks | ${{ steps.gitleaks.outcome == 'success' && '✅' || '❌' }} |
          | 📦 Snyk (SCA) | ${{ steps.snyk.outcome == 'success' && '✅' || '⚠️' }} |
          | 🧬 PHPStan | ${{ steps.phpstan.outcome == 'success' && '✅' || '❌' }} |
          | 🎯 Semgrep | ${{ steps.semgrep.outcome == 'success' && '✅' || '⚠️' }} |
          | 🏗️ Checkov | ${{ steps.checkov.outcome == 'success' && '✅' || '❌' }} |
          | 🛡️ Trivy | ${{ steps.trivy.outcome == 'success' && '✅' || '❌' }} |
          EOF

      # ========================================
      # FASE 12: AUDIT LOGGING
      # ========================================
      - name: 📝 Generate Audit Log
        if: always()
        env:
          SCORE: ${{ steps.security_score.outputs.score }}
          BRANCH: ${{ github.ref_name }}
          USER: ${{ github.actor }}
        run: |
          cat > audit-log.json << EOF
          {
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "pipeline_run": "${{ github.run_number }}",
            "security_score": $SCORE,
            "branch": "$BRANCH",
            "triggered_by": "$USER",
            "status": "${{ job.status }}"
          }
          EOF

      - name: 📤 Upload Audit Log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: audit-log-${{ github.sha }}
          path: audit-log.json