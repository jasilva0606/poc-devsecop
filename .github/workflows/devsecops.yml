name: DevSecOps 10/10 Enterprise
on: 
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SEVERITY_THRESHOLD: CRITICAL,HIGH

permissions:
  contents: read
  security-events: write
  issues: write
  pull-requests: write

jobs:
  build-and-secure:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ========================================
      # FASE 1: SECRET SCANNING
      # ========================================
      - name: 🔐 Gitleaks Secret Scan
        id: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      - name: 🔍 TruffleHog Secret Scan (Corregido)
        id: trufflehog
        uses: trufflesecurity/trufflehog@main # Usar main para actualizaciones de lógica
        continue-on-error: true
        with:
          path: ./
          # CORRECCIÓN 1: Se eliminan base/head manuales y extra_args (ahora es args)
          args: --results=verified,unknown

      # ========================================
      # FASE 2: DEPENDENCY SECURITY (SCA)
      # ========================================
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, json

      - name: Install Dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: 📦 Snyk Dependency Scan (SCA)
        id: snyk
        uses: snyk/actions/php@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --json-file-output=snyk-results.json

      # ========================================
      # FASE 3: SAST (Análisis Estático)
      # ========================================
      - name: 🧬 PHPStan Static Analysis
        id: phpstan
        run: |
          # Instalamos dependencias de desarrollo para que PHPStan vea PHPUnit
          composer install --optimize-autoloader
          
          # Ejecutamos el binario local
          vendor/bin/phpstan analyse src tests --level=6 --error-format=github
      - name: 🎯 Semgrep SAST Scan (Corregido)
        id: semgrep
        uses: semgrep/semgrep-action@v1 # Versión actualizada
        with:
          config: >-
            p/owasp-top-ten
            p/php
            p/security-audit
          generateSarif: "1" # CORRECCIÓN 2: Se pasa como string para evitar warnings

      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v4 # Actualizado a v4
        if: always()
        with:
          sarif_file: semgrep.sarif

      # ========================================
      # FASE 4: IaC SECURITY
      # ========================================
      - name: 🏗️ Checkov Dockerfile Scan
        id: checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: dockerfile,github_actions
          output_format: cli,sarif
          output_file_path: console,checkov.sarif

      - name: Upload Checkov SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: checkov.sarif

      # ========================================
      # FASE 5: CONTAINER BUILD & SCAN
      # ========================================
      - name: 🐳 Build Protected Image
        id: build
        run: |
          docker build \
            -t weather-api:${{ github.sha }} \
            .

      - name: 🛡️ Trivy Container Scan
        id: trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'weather-api:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      # ... (Fases 6 a 9 se mantienen igual) ...

      # ========================================
      # FASE 10: REPORTING (Corregido contra Inyección)
      # ========================================
      - name: 📋 Generate Pipeline Summary
        if: always()
        env: # CORRECCIÓN 3: Pasar datos mediante ENV para evitar Shell Injection detectada por Semgrep
          RUN_NUM: ${{ github.run_number }}
          SHA: ${{ github.sha }}
          BRANCH: ${{ github.ref_name }}
          USER: ${{ github.actor }}
          SCORE: ${{ steps.security_score.outputs.score }}
        run: |
          cat << EOF >> $GITHUB_STEP_SUMMARY
          ## 🛡️ DevSecOps Security Scorecard
          
          **Pipeline Run**: #$RUN_NUM
          **Commit**: \`$SHA\`
          **Branch**: \`$BRANCH\`
          **Triggered by**: @$USER
          **Security Score**: **$SCORE/100**
          
          ---
          ### 🔒 Security Checks
          | Tool | Status |
          | :--- | :---: |
          | 🔐 Gitleaks | ${{ steps.gitleaks.outcome == 'success' && '✅' || '❌' }} |
          | 🧬 PHPStan | ${{ steps.phpstan.outcome == 'success' && '✅' || '❌' }} |
          | 🛡️ Trivy | ${{ steps.trivy.outcome == 'success' && '✅' || '❌' }} |
          EOF

      # ========================================
      # FASE 12: AUDIT LOGGING (Corregido)
      # ========================================
      - name: 📝 Generate Audit Log
        if: always()
        env:
          SCORE: ${{ steps.security_score.outputs.score }}
        run: |
          cat > audit-log.json << EOF
          {
            "audit_version": "2.0",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "pipeline_run": "${{ github.run_number }}",
            "security_score": $SCORE,
            "status": "${{ job.status }}"
          }
          EOF