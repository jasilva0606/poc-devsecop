name: DevSecOps Enterprise — Fixed PoC
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SEVERITY_THRESHOLD: CRITICAL,HIGH
  MAX_DIFF_SIZE: "204800"

permissions:
  contents: read
  security-events: write
  issues: write
  pull-requests: write

jobs:
  preflight:
    name: Preflight — Validate Secrets
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Validate required secrets
        run: |
          MISSING=""
          [ -z "${{ secrets.GITLEAKS_LICENSE }}" ] && MISSING="$MISSING GITLEAKS_LICENSE"
          [ -z "${{ secrets.SNYK_TOKEN }}" ] && MISSING="$MISSING SNYK_TOKEN"
          if [ -n "$MISSING" ]; then
            echo "::error::Secrets faltantes:$MISSING"
            exit 1
          fi
          echo "✅ Secrets presentes"

  build-and-secure:
    name: Security Pipeline
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout Code
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
        with:
          fetch-depth: 0

      # ========================================
      # FASE 1: SECRET SCANNING
      # ========================================
      - name: 🔐 Gitleaks Secret Scan
        id: gitleaks
        uses: gitleaks/gitleaks-action@f6935564309322da10da0085d734898144005b63 # v2.3.7
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      - name: 🔍 TruffleHog Secret Scan
        id: trufflehog
        uses: trufflesecurity/trufflehog@65f8dafe5ca5b67f6edd8e2e4680fd225b97d760 # v3.81.0
        with:
          path: ./
          extra_args: --results=verified,unknown

      # ========================================
      # FASE 2: DEPENDENCY SECURITY (SCA)
      # ========================================
      - name: Setup PHP
        uses: shivammathur/setup-php@c541c155eee45413f5051817e2d4bff14a3f1e47 # v2.31.1
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, json

      - name: Install Dependencies
        run: |
          if [ -f composer.json ]; then
            composer install --no-interaction --prefer-dist
          else
            echo "PoC sin composer.json, creando uno básico..."
            echo '{"name": "poc/devsecops","require": {}}' > composer.json
            composer install --no-interaction
          fi

      - name: 📦 Snyk Dependency Scan (SCA)
        id: snyk
        uses: snyk/actions/php@b98d498629f1c5e001dc34be4c008cfcfe61f4e0 # v0.0.1
        continue-on-error: ${{ github.ref != 'refs/heads/main' }}
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --json-file-output=snyk-results.json

      # ========================================
      # FASE 3: SAST (Static Analysis)
      # ========================================
      - name: 🧬 PHPStan Static Analysis
        id: phpstan
        run: |
          composer require --dev phpstan/phpstan --no-interaction
          # Análisis de la carpeta src (asegúrate de que tu código esté ahí)
          vendor/bin/phpstan analyse src --level=5 --error-format=github || echo "PHPStan encontró detalles"

      - name: 🎯 Semgrep SAST Scan
        id: semgrep
        run: |
          docker run --rm -v "$(pwd)":/src returntocorp/semgrep semgrep scan \
            --config auto --sarif --output=semgrep.sarif || true

      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@48ab8b43c660b85da36b1f1b5b19cd79f43e81e5 # v3.25.11
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: semgrep

      # ========================================
      # FASE 4: IaC SECURITY
      # ========================================
      - name: 🏗️ Checkov Scan
        id: checkov
        uses: bridgecrewio/checkov-action@f36129841f32a76f23602526e0e64303b7119f96 # v12.2855.0
        with:
          directory: .
          framework: dockerfile,github_actions
          output_format: cli,sarif
          output_file_path: console,checkov.sarif
          soft_fail: false

      # ========================================
      # FASE 5: CONTAINER BUILD & SCAN
      # ========================================
      - name: 🐳 Build Image
        id: build
        run: docker build -t poc-app:${{ github.sha }} .

      - name: 🛡️ Trivy Container Scan
        id: trivy
        uses: aquasecurity/trivy-action@18f2135c0c3e13fec0b6b5b4b1ece7e0fe8b3f48 # v0.23.0
        with:
          image-ref: 'poc-app:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: ${{ github.ref == 'refs/heads/main' && '1' || '0' }}

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@48ab8b43c660b85da36b1f1b5b19cd79f43e81e5 # v3.25.11
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
          category: trivy

      # ========================================
      # FASE 8: AI Security Audit
      # ========================================
      - name: 🤖 AI Security Audit (Groq)
        id: ai_audit
        if: github.event_name == 'pull_request'
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CODE_DIFF: ${{ github.event.pull_request.diff_url }} 
        run: |
          pip install requests urllib3 --quiet
          python3 .github/scripts/ai_audit.py

      # ========================================
      # FASE 9: METRICS & SUMMARY
      # ========================================
      - name: 📊 Calculate Score
        id: security_score
        if: always()
        run: |
          SCORE=100
          [ "${{ steps.gitleaks.outcome }}" != "success" ] && SCORE=$((SCORE - 25))
          [ "${{ steps.trufflehog.outcome }}" != "success" ] && SCORE=$((SCORE - 25))
          [ "${{ steps.snyk.outcome }}" == "failure" ] && SCORE=$((SCORE - 15))
          [ "${{ steps.trivy.outcome }}" != "success" ] && SCORE=$((SCORE - 20))
          [ "${{ steps.checkov.outcome }}" != "success" ] && SCORE=$((SCORE - 15))
          [ "$SCORE" -lt 0 ] && SCORE=0
          echo "score=$SCORE" >> "$GITHUB_OUTPUT"

      - name: 📋 Summary
        if: always()
        run: |
          echo "## 🛡️ Scorecard: ${{ steps.security_score.outputs.score }}/100" >> $GITHUB_STEP_SUMMARY
          echo "| Tool | Status |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :---: |" >> $GITHUB_STEP_SUMMARY
          echo "| 🔐 Gitleaks | ${{ steps.gitleaks.outcome == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 Snyk | ${{ steps.snyk.outcome == 'success' && '✅' || '⚠️' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🏗️ Checkov | ${{ steps.checkov.outcome == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 🛡️ Trivy | ${{ steps.trivy.outcome == 'success' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY

      # ========================================
      # FASE 10: AUDIT LOG (jq)
      # ========================================
      - name: 📝 Audit Log
        if: always()
        run: |
          jq -n \
            --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            --arg run "${{ github.run_number }}" \
            --arg score "${{ steps.security_score.outputs.score }}" \
            --arg branch "${{ github.ref_name }}" \
            --arg user "${{ github.actor }}" \
            '{timestamp: $ts, run: $run, score: $score, branch: $branch, user: $user}' \
            > audit-log.json

      - name: 📤 Upload Log
        uses: actions/upload-artifact@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v4.3.4
        if: always()
        with:
          name: audit-log-${{ github.sha }}
          path: audit-log.json
