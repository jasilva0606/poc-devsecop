name: DevSecOps 10/10 Enterprise
on: [push, pull_request]

jobs:
  build-and-secure:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1. SECRET SCANNING (Con blindaje de licencia)
      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      # 2. SAST (Análisis de código estático)
      - name: PHPStan Static Analysis
        uses: phpstan/phpstan-action@v1
        with:
          version: latest
          level: 5
          paths: src

      # 3. BUILD CON IMAGEN ULTRA-LIGHT (Alpine)
      - name: Build Protected Image
        run: |
          docker build -t weather-api:latest .

      # 4. TRIVY (Vulnerabilidades de SO)
      - name: Trivy Container Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'weather-api:latest'
          severity: 'CRITICAL,HIGH'
          exit-code: 1  # Rompe el pipeline si hay críticos

      # 5. SBOM (Cumplimiento Legal/Compliance)
      - name: Generate SBOM
        run: |
          docker run --rm -v $(pwd):/out anchore/syft weather-api:latest -o spdx-json > sbom.json

      # 6. AI AUDIT CON SANITIZACIÓN DE LOGS (El 10/10)
      - name: AI Security Audit
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          # Extraemos el diff pero filtramos palabras clave antes de que toque cualquier variable
          export CODE_DIFF=$(git diff HEAD^ HEAD | grep -vE 'password|token|key|secret' | head -c 4000)
          python .github/scripts/ai_audit.py | sed 's/${{ secrets.GROQ_API_KEY }}/[REDACTED]/g'

      # 7. ARTIFACTS
      - name: Upload Security Reports
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            sbom.json
            trivy-results.sarif