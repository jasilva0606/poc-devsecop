name: DevSecOps Enterprise — Fixed
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  security-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      # ========================================
      # SECRET SCANNING
      # ========================================
      - name: 🔐 Gitleaks
        id: gitleaks
        uses: gitleaks/gitleaks-action@29486940026e1081308307ba8929e46a7820a40d # v2.3.8
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      - name: 🔍 TruffleHog
        id: trufflehog
        uses: trufflesecurity/trufflehog@e8093110903328e3b7b251950e1814e304910406 # v3.82.12
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --results=verified,unknown

      # ========================================
      # SCA (Dependencies)
      # ========================================
      - name: Setup PHP
        uses: shivammathur/setup-php@9013dd9213c20c92211d137775560624513bc742 # v2.32.0
        with:
          php-version: '8.2'

      - name: 📦 Snyk Scan
        id: snyk
        uses: snyk/actions/php@cd9a6135821c37b7193297a51d87192667d4f9f7 # v0.0.1
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      # ========================================
      # SAST & IaC
      # ========================================
      - name: 🏗️ Checkov Scan
        id: checkov
        uses: bridgecrewio/checkov-action@994df589b9176378c3c121404e433433600f1338 # v12.2941.0
        with:
          directory: .
          soft_fail: true

      # ========================================
      # CONTAINER SCANNING
      # ========================================
      - name: 🛡️ Trivy Scan
        id: trivy
        uses: aquasecurity/trivy-action@18f2135c0c3e13fec0b6b5b4b1ece7e0fe8b3f48 # v0.28.0
        with:
          image-ref: 'poc-app:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@df5a14dc28094dc936e103b50656c00ff2fc5654 # v3.28.5
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
          category: trivy

      # ========================================
      # ARTIFACTS & LOGS
      # ========================================
      - name: 📤 Upload Artifact
        uses: actions/upload-artifact@65c86c38e15e0478ca652d9e60ed0a31e3309e90 # v4.6.0
        if: always()
        with:
          name: security-reports
          path: |
            trivy-results.sarif
            ai-audit-report.md