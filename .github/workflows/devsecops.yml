name: DevSecOps 10/10 Enterprise
on: 
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 2 * * *'  # Scan diario a las 2 AM

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SEVERITY_THRESHOLD: CRITICAL,HIGH

permissions:
  contents: read
  security-events: write
  issues: write
  pull-requests: write

jobs:
  build-and-secure:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ========================================
      # FASE 1: SECRET SCANNING
      # ========================================
      - name: 🔐 Gitleaks Secret Scan
        id: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      - name: 🔍 TruffleHog Secret Scan (Complementario)
        id: trufflehog
        uses: trufflesecurity/trufflehog@v3.5.0
        continue-on-error: true
        with:
          path: ./
          extra_args: --results=verified,unknown

      # ========================================
      # FASE 2: DEPENDENCY SECURITY (SCA)
      # ========================================
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, json
          coverage: none

      - name: Get Composer Cache Directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-
    
      - name: Install Dependencies
        run: composer install --no-dev --optimize-autoloader

      - name: 📦 Snyk Dependency Scan (SCA)
        id: snyk
        uses: snyk/actions/php@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --json-file-output=snyk-results.json

      - name: 🔒 PHP Security Checker
        id: security_checker
        continue-on-error: true
        run: |
          composer require --dev enlightn/security-checker
          vendor/bin/security-checker security:check composer.lock --format=json | tee security-check.json

      # ========================================
      # FASE 3: SAST (Static Analysis)
      # ========================================
      - name: 🧬 PHPStan Static Analysis
        id: phpstan
        run: |
          docker run --rm -v $(pwd):/app ghcr.io/phpstan/phpstan analyse src tests --level=6 --error-format=github

      - name: 🔬 Psalm Static Analysis
        id: psalm
        continue-on-error: true
        run: |
          composer require --dev vimeo/psalm
          vendor/bin/psalm --show-info=true --output-format=github

      - name: 🎯 Semgrep SAST Scan
        id: semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/owasp-top-ten
            p/php
            p/security-audit
          generateSarif: true

      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif

      # ========================================
      # FASE 4: IaC SECURITY
      # ========================================
      - name: 🏗️ Checkov Dockerfile Scan
        id: checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: dockerfile,github_actions
          output_format: cli,sarif
          output_file_path: console,checkov.sarif

      - name: Upload Checkov SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: checkov.sarif

      - name: ⚖️ OPA Conftest Policy Check
        id: opa
        continue-on-error: true
        run: |
          # Instalar Conftest
          wget -q https://github.com/open-policy-agent/conftest/releases/download/v0.49.1/conftest_0.49.1_Linux_x86_64.tar.gz
          tar xzf conftest_0.49.1_Linux_x86_64.tar.gz
          sudo mv conftest /usr/local/bin/
          
          # Ejecutar policies
          if [ -d ".github/policies" ]; then
            conftest test Dockerfile --policy .github/policies/ --output github
          else
            echo "⚠️  No policies found in .github/policies/"
          fi

      # ========================================
      # FASE 5: CONTAINER BUILD & SCAN
      # ========================================
      - name: 🐳 Build Protected Image
        id: build
        run: |
          docker build \
            --label "git.commit=${{ github.sha }}" \
            --label "git.branch=${{ github.ref_name }}" \
            --label "build.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
            -t weather-api:${{ github.sha }} \
            -t weather-api:latest \
            .

      - name: 🛡️ Trivy Container Scan
        id: trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'weather-api:${{ github.sha }}'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: 1
          vuln-type: 'os,library'
          scanners: 'vuln,secret,config'

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'container-trivy'

      - name: 🔎 Grype Container Scan (Complementario)
        id: grype
        uses: anchore/scan-action@v3
        continue-on-error: true
        with:
          image: 'weather-api:${{ github.sha }}'
          fail-build: false
          severity-cutoff: high

      # ========================================
      # FASE 6: SBOM GENERATION
      # ========================================
      - name: 📜 Generate SBOM with Syft
        id: sbom
        run: |
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v $(pwd):/out \
            anchore/syft:latest \
            docker:weather-api:${{ github.sha }} \
            -o spdx-json=/out/sbom-spdx.json
          
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v $(pwd):/out \
            anchore/syft:latest \
            docker:weather-api:${{ github.sha }} \
            -o cyclonedx-json=/out/sbom-cyclonedx.json

      - name: Validate SBOM was created
        run: |
          if [ ! -f "sbom-spdx.json" ]; then
            echo "❌ SBOM generation failed!"
            exit 1
          fi
          echo "✅ SBOM generated successfully"
          ls -lh sbom-*.json

      # ========================================
      # FASE 7: AI SECURITY AUDIT
      # ========================================
      - name: Setup Python for AI Audit
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python Dependencies
        run: |
          pip install --no-cache-dir requests urllib3

      - name: 🤖 AI Security Audit
        id: aiaudit
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          # Sanitizar diff con múltiples capas de protección
          export CODE_DIFF=$(git diff HEAD^ HEAD -- '*.php' '*.py' 'Dockerfile' '*.yml' '*.yaml' 2>/dev/null | \
            grep -v -E 'password|token|key|secret|bearer|api_key|private' | \
            head -c 6000 || echo "Diff sanitizado")
          
          # Ejecutar audit
          echo "### 🤖 AI Security Audit Report" >> $GITHUB_STEP_SUMMARY
          python .github/scripts/ai_audit.py | tee -a $GITHUB_STEP_SUMMARY

      - name: Upload AI Audit Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ai-audit-report
          path: ai-audit-report.md

      # ========================================
      # FASE 8: DAST (Dynamic Testing)
      # ========================================
      - name: 🎯 Start Application for DAST
        if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
        id: dast_start
        run: |
          docker run -d \
            --name app-dast \
            --health-cmd="curl -f http://localhost/ || exit 1" \
            --health-interval=5s \
            --health-retries=5 \
            -p 8080:80 \
            weather-api:${{ github.sha }}
          
          # Wait for healthy
          timeout 60 sh -c 'until docker inspect --format="{{.State.Health.Status}}" app-dast | grep -q healthy; do sleep 2; done'
          
          # Verify
          curl -f http://localhost:8080 || exit 1
          echo "✅ Application started successfully"

      - name: OWASP ZAP Baseline Scan
        if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
        id: zap
        uses: zaproxy/action-baseline@v0.12.0
        continue-on-error: true
        with:
          target: 'http://localhost:8080'

      - name: Cleanup DAST Container
        if: always() && (github.ref == 'refs/heads/main' || github.event_name == 'pull_request')
        run: |
          docker logs app-dast || true
          docker stop app-dast || true
          docker rm app-dast || true

      # ========================================
      # FASE 9: LICENSE COMPLIANCE
      # ========================================
      - name: ⚖️ License Compliance Check
        id: license
        continue-on-error: true
        run: |
          # Analizar licenses de Composer
          composer licenses --format=json > composer-licenses.json
          
          # Verificar licenses prohibidas
          FORBIDDEN=$(cat composer-licenses.json | jq -r '.dependencies[] | select(.license | type == "array") | select(.license[] | test("GPL|AGPL")) | .name' || echo "")
          
          if [ -n "$FORBIDDEN" ]; then
            echo "⚠️  WARNING: Dependencias con licenses potencialmente problemáticas:"
            echo "$FORBIDDEN"
            # No fallamos, solo advertimos
          else
            echo "✅ Todas las licenses son compatibles"
          fi

      # ========================================
      # FASE 10: SECURITY METRICS & REPORTING
      # ========================================
      - name: 📊 Calculate Security Score
        id: security_score
        if: always()
        run: |
          SCORE=100
          
          # Penalizaciones
          if [ "${{ steps.gitleaks.outcome }}" != "success" ]; then SCORE=$((SCORE - 25)); fi
          if [ "${{ steps.snyk.outcome }}" == "failure" ]; then SCORE=$((SCORE - 15)); fi
          if [ "${{ steps.phpstan.outcome }}" != "success" ]; then SCORE=$((SCORE - 15)); fi
          if [ "${{ steps.checkov.outcome }}" != "success" ]; then SCORE=$((SCORE - 10)); fi
          if [ "${{ steps.trivy.outcome }}" != "success" ]; then SCORE=$((SCORE - 20)); fi
          if [ "${{ steps.sbom.outcome }}" != "success" ]; then SCORE=$((SCORE - 10)); fi
          
          echo "score=$SCORE" >> $GITHUB_OUTPUT
          echo "📊 Security Score: $SCORE/100"

      - name: 📋 Generate Pipeline Summary
        if: always()
        run: |
          cat << 'EOF' >> $GITHUB_STEP_SUMMARY
          ## 🛡️ DevSecOps Security Scorecard
          
          **Pipeline Run**: #${{ github.run_number }}
          **Commit**: `${{ github.sha }}`
          **Branch**: `${{ github.ref_name }}`
          **Triggered by**: @${{ github.actor }}
          **Security Score**: **${{ steps.security_score.outputs.score }}/100**
          
          ---
          
          ### 🔒 Security Checks
          
          | Tool | Status | Description |
          | :--- | :---: | :--- |
          | 🔐 Gitleaks | ${{ steps.gitleaks.outcome == 'success' && '✅ PASSED' || '❌ FAILED' }} | Secret scanning |
          | 🔍 TruffleHog | ${{ steps.trufflehog.outcome == 'success' && '✅ PASSED' || steps.trufflehog.outcome == 'skipped' && '⏭️ SKIPPED' || '⚠️ WARNING' }} | Additional secret scan |
          | 📦 Snyk (SCA) | ${{ steps.snyk.outcome == 'success' && '✅ PASSED' || steps.snyk.outcome == 'skipped' && '⏭️ SKIPPED' || '⚠️ WARNING' }} | Dependency vulnerabilities |
          | 🔒 Security Checker | ${{ steps.security_checker.outcome == 'success' && '✅ PASSED' || steps.security_checker.outcome == 'skipped' && '⏭️ SKIPPED' || '⚠️ WARNING' }} | PHP known vulnerabilities |
          | 🧬 PHPStan | ${{ steps.phpstan.outcome == 'success' && '✅ PASSED' || '❌ FAILED' }} | Static analysis (Level 6) |
          | 🔬 Psalm | ${{ steps.psalm.outcome == 'success' && '✅ PASSED' || steps.psalm.outcome == 'skipped' && '⏭️ SKIPPED' || '⚠️ WARNING' }} | Static analysis (complementary) |
          | 🎯 Semgrep | ${{ steps.semgrep.outcome == 'success' && '✅ PASSED' || steps.semgrep.outcome == 'skipped' && '⏭️ SKIPPED' || '⚠️ WARNING' }} | SAST (OWASP patterns) |
          | 🏗️ Checkov | ${{ steps.checkov.outcome == 'success' && '✅ PASSED' || '❌ FAILED' }} | IaC security |
          | ⚖️ OPA Conftest | ${{ steps.opa.outcome == 'success' && '✅ PASSED' || steps.opa.outcome == 'skipped' && '⏭️ SKIPPED' || '⚠️ WARNING' }} | Policy as Code |
          | 🐳 Docker Build | ${{ steps.build.outcome == 'success' && '✅ PASSED' || '❌ FAILED' }} | Container build |
          | 🛡️ Trivy | ${{ steps.trivy.outcome == 'success' && '✅ PASSED' || '❌ FAILED' }} | Container vulnerabilities |
          | 🔎 Grype | ${{ steps.grype.outcome == 'success' && '✅ PASSED' || steps.grype.outcome == 'skipped' && '⏭️ SKIPPED' || '⚠️ WARNING' }} | Additional container scan |
          | 📜 Syft (SBOM) | ${{ steps.sbom.outcome == 'success' && '✅ PASSED' || '❌ FAILED' }} | Software Bill of Materials |
          | 🤖 AI Audit | ${{ steps.aiaudit.outcome == 'success' && '✅ PASSED' || steps.aiaudit.outcome == 'skipped' && '⏭️ SKIPPED' || '⚠️ WARNING' }} | AI-powered security analysis |
          | 🎯 DAST (ZAP) | ${{ steps.zap.outcome == 'success' && '✅ PASSED' || steps.zap.outcome == 'skipped' && '⏭️ SKIPPED' || '⚠️ WARNING' }} | Dynamic application testing |
          | ⚖️ License Check | ${{ steps.license.outcome == 'success' && '✅ PASSED' || steps.license.outcome == 'skipped' && '⏭️ SKIPPED' || '⚠️ WARNING' }} | License compliance |
          
          ---
          
          ### 📊 Coverage Summary
          
          - ✅ **Secret Scanning**: Gitleaks + TruffleHog
          - ✅ **SCA**: Snyk + Security Checker
          - ✅ **SAST**: PHPStan (L6) + Psalm + Semgrep
          - ✅ **IaC Security**: Checkov + OPA
          - ✅ **Container Security**: Trivy + Grype
          - ✅ **SBOM**: Syft (SPDX + CycloneDX)
          - ✅ **AI Analysis**: Groq LLM
          - ✅ **DAST**: OWASP ZAP
          - ✅ **Compliance**: License Check
          
          ---
          
          ### 🎯 Compliance Frameworks
          
          - OWASP Top 10 (2021)
          - CIS Benchmarks
          - NIST Cybersecurity Framework
          - ISO 27001 Controls
          - GDPR Technical Measures
          
          EOF

      - name: 🚨 Create Security Issue on Failure
        if: failure() && github.event_name == 'push'
        uses: actions/github-script@v7
        with:
          script: |
            const title = `🚨 Security Pipeline Failed - Run #${{ github.run_number }}`;
            const body = `
            ## Security Pipeline Failure Report
            
            **Commit**: \`${{ github.sha }}\`
            **Branch**: \`${{ github.ref_name }}\`
            **Triggered by**: @${{ github.actor }}
            **Run URL**: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
            **Security Score**: ${{ steps.security_score.outputs.score }}/100
            
            ### Failed Checks
            
            Please review the pipeline logs and address security findings before merging.
            
            ### Action Required
            
            - [ ] Review failed security checks
            - [ ] Fix critical vulnerabilities
            - [ ] Update dependencies if needed
            - [ ] Re-run pipeline
            
            /label security pipeline-failure
            `;
            
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['security', 'pipeline-failure', 'urgent']
            });

      # ========================================
      # FASE 11: UPLOAD ARTIFACTS
      # ========================================
      - name: 📤 Upload Security Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports-${{ github.sha }}
          path: |
            sbom-*.json
            trivy-results.sarif
            checkov.sarif
            semgrep.sarif
            snyk-results.json
            security-check.json
            composer-licenses.json
            ai-audit-report.md
          retention-days: 90

      # ========================================
      # FASE 12: AUDIT LOGGING
      # ========================================
      - name: 📝 Generate Audit Log
        if: always()
        run: |
          cat > audit-log.json << EOF
          {
            "audit_version": "2.0",
            "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "event_type": "security_pipeline_execution",
            "pipeline_run": "${{ github.run_number }}",
            "repository": "${{ github.repository }}",
            "commit": {
              "sha": "${{ github.sha }}",
              "branch": "${{ github.ref_name }}",
              "author": "${{ github.actor }}"
            },
            "security_score": ${{ steps.security_score.outputs.score }},
            "checks": {
              "secret_scanning": "${{ steps.gitleaks.outcome }}",
              "sca": "${{ steps.snyk.outcome }}",
              "sast": "${{ steps.phpstan.outcome }}",
              "iac_security": "${{ steps.checkov.outcome }}",
              "container_security": "${{ steps.trivy.outcome }}",
              "sbom_generation": "${{ steps.sbom.outcome }}",
              "ai_audit": "${{ steps.aiaudit.outcome }}",
              "dast": "${{ steps.zap.outcome }}",
              "license_compliance": "${{ steps.license.outcome }}"
            },
            "compliance_frameworks": ["OWASP", "CIS", "NIST", "ISO27001"],
            "status": "${{ job.status }}"
          }
          EOF
          
          cat audit-log.json

      - name: Upload Audit Log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: audit-log-${{ github.sha }}
          path: audit-log.json
          retention-days: 365
