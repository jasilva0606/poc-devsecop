name: DevSecOps Lab

on: [push]

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 1. IA Audit (Groq) con filtro
      - name: AI Audit
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          # Filtramos el diff para que solo incluya archivos de código y no el .lock o vendor
          export CODE_DIFF=$(git diff HEAD^ HEAD -- 'src/*.php' 'Dockerfile' '*.yml' || echo "Cambios demasiado grandes para mostrar")
          python .github/scripts/ai_audit.py

      # 2. Secret Scanning - AHORA SIN continue-on-error
      - name: Gitleaks Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      # 3. IaC - AHORA SIN soft_fail (Falla si el Dockerfile es inseguro)
      - name: Checkov Scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: .
          framework: dockerfile
          # soft_fail: false (por defecto)

      # 4. SCA - Falla si hay librerías vulnerables
      - name: Snyk Scan
        uses: snyk/actions/php@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      # 5. Build y Escaneo de Imagen
      - name: Build Image
        run: docker build -t weather-api:latest .

      - name: Trivy Image Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'weather-api:latest'
          format: 'table'
          exit-code: 1 # Esto hace que el pipeline falle si hay vulnerabilidades
          severity: 'CRITICAL' # Solo frenamos por CRITICAL para ser realistas